name: cheragh_app
description: "اپلیکیشن رسمی هیئت بابالحوائج زمان‌آباد - چراغ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  lottie: ^3.1.3
  flutter_staggered_animations: ^1.1.1

  # Media / audio
  just_audio: ^0.9.40
  audio_video_progress_bar: ^2.0.3

  # Prayer times
  adhan: ^2.0.0

  # Utility
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  qr_flutter: ^4.1.0
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1
  table_calendar: ^3.1.2
  go_router: ^14.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Regular.ttf
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500

